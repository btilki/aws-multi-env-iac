# Reusable Terragrunt runner with shared Terraform and AWS auth setup.

name: _terragrunt-run

on:
  workflow_call:
    inputs:
      deployment_environment:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      terragrunt_command:
        required: true
        type: string
      skip_dep_outputs:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    environment: ${{ inputs.deployment_environment }}
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TG_NON_INTERACTIVE: "true"
      TG_DISABLE_BUCKET_UPDATE: "true"
      TERRAGRUNT_NON_INTERACTIVE: "true"
      TERRAGRUNT_DISABLE_BUCKET_UPDATE: "true"
      TG_SKIP_DEP_OUTPUTS: ${{ inputs.skip_dep_outputs }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Install Terragrunt
        run: |
          TG_VERSION=0.67.10
          curl -sSL -o terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt

      - name: Validate AWS auth configuration
        run: |
          if [ -n "${AWS_ROLE_TO_ASSUME}" ]; then
            echo "Using OIDC role authentication."
          elif [ -n "${AWS_ACCESS_KEY_ID}" ] && [ -n "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "Using static key authentication."
          else
            echo "Missing AWS auth configuration. Set AWS_ROLE_TO_ASSUME (OIDC) or both AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY secrets."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-central-1

      - name: Configure AWS credentials (static keys fallback)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Run Terragrunt command
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.terragrunt_command }}
