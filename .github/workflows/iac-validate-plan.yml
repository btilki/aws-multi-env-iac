# Validates IaC formatting/security and runs Terragrunt plans per environment.

name: iac-validate-plan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Install Terragrunt
        run: |
          TG_VERSION=0.67.10
          curl -sSL -o terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terragrunt hclfmt check
        run: terragrunt hclfmt --check

      - name: Terraform validate (bootstrap)
        working-directory: bootstrap
        run: |
          terraform init -backend=false
          terraform validate

  security:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: .

  plan:
    needs: [security]
    uses: ./.github/workflows/_terragrunt-run.yml
    secrets: inherit
    strategy:
      matrix:
        environment: [dev, staging, prod]
    concurrency:
      group: plan-${{ matrix.environment }}
      cancel-in-progress: false
    with:
      deployment_environment: ${{ matrix.environment }}
      working_directory: live/${{ matrix.environment }}
      terragrunt_command: terragrunt run-all plan --terragrunt-source-update --terragrunt-non-interactive --terragrunt-disable-bucket-update -no-color
      skip_dep_outputs: true

  plan-comment:
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - name: PR plan comment
        uses: actions/github-script@v7
        with:
          script: |
            const envName = '${{ matrix.environment }}';
            const body = `Terraform plan completed for **${envName}**. Check workflow logs for details.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
